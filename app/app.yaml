command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

env:
  - name: LAKESIGNAL_CATALOG
    value: lakesignal
  - name: LAKESIGNAL_SCHEMA
    value: core
  - name: LAKESIGNAL_MODEL
    value: databricks-claude-sonnet-4
  - name: DATABRICKS_WAREHOUSE_ID
    value: 2303df3a9d62fe19
  # DATABRICKS_HOST and the service-principal OAuth token are provided
  # automatically by the Apps runtime.
